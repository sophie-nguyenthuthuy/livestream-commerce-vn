apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livestream-vn
  namespace: livestream-vn
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 4m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.livestream-vn.example
        - api.livestream-vn.example
      secretName: livestream-vn-tls
  rules:
    - host: app.livestream-vn.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.livestream-vn.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
