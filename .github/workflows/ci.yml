name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: livestream
          POSTGRES_PASSWORD: livestream
          POSTGRES_DB: livestream_vn_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U livestream"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      APP_ENV: test
      APP_SECRET_KEY: ci-secret-please-change-1234
      DATABASE_URL: postgresql+asyncpg://livestream:livestream@localhost:5432/livestream_vn_test
      REDIS_URL: redis://localhost:6379/1
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ci
      S3_SECRET_KEY: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        working-directory: backend
        run: |
          pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check app tests
      - name: Type check
        working-directory: backend
        run: mypy app
      - name: Migrate
        working-directory: backend
        run: alembic upgrade head
      - name: Test
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build
